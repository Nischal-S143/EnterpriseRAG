version: "3.9"

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: pagani-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pagani
      POSTGRES_PASSWORD: pagani_secret
      POSTGRES_DB: pagani
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pagani"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pagani-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pagani:pagani_secret@postgres:5432/pagani
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # ⚠️  SECURITY: JWT secrets MUST be set in your .env before running.
      # Generate strong secrets with: python -c "import secrets; print(secrets.token_urlsafe(64))"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data/uploads:/app/data/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Redis Cache (optional) ──
  redis:
    image: redis:7-alpine
    container_name: pagani-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pagani-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  redis_data:
