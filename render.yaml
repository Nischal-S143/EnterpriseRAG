services:
  - type: web
    name: pagani-backend
    env: python
    region: oregon # Or whatever is closest to you
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this manually in Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false # Set to Vercel URL
      - key: PYTHON_VERSION
        value: 3.11.0
