name: Enterprise RAG CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend Tests ──
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (ruff)
        run: |
          pip install ruff
          ruff check . --ignore E501

      - name: Run backend tests
        env:
          DATABASE_URL: sqlite:///test.db
          JWT_SECRET_KEY: ci-test-secret-key
          GEMINI_API_KEY: ci-test-key
        run: |
          python -m pytest tests/ -v --tb=short -x

  # ── Frontend Build ──
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit || true

      - name: Build production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Docker Build Validation ──
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config

      - name: Build backend image
        run: docker build -t enterprise-rag-backend -f backend/Dockerfile backend/

      - name: Build frontend image
        run: docker build -t enterprise-rag-frontend -f Dockerfile.frontend .
